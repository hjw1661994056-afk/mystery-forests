<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【身份揭秘】第13号修正案</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --wolf-red: #ff4d4d;
            --human-blue: #4da6ff;
            --text-gold: #d4c4a8;
            --input-bg: #262626;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            font-family: "PingFang SC", "Microsoft YaHei", monospace;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-gold);
        }

        /* 增加整体质感 */
        .main-card {
            width: 88%; max-width: 360px;
            background: #222;
            border: 2px solid #333;
            padding: 40px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center;
            transition: all 0.6s ease;
        }

        .header-title {
            font-size: 0.9rem; letter-spacing: 3px; color: #666;
            margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 10px;
        }

        /* 重点优化：让输入框更显眼 */
        .input-area { margin-bottom: 25px; text-align: left; }
        
        label { display: block; font-size: 0.75rem; margin-bottom: 10px; color: #888; }

        input {
            width: 100%; height: 50px;
            background: var(--input-bg);
            border: 1px solid #d4c4a8; /* 明显的金棕色边框 */
            color: #fff; /* 输入文字为白色 */
            font-size: 1.2rem; text-align: center;
            box-sizing: border-box; outline: none;
            border-radius: 4px;
        }

        input:focus { border-color: #fff; box-shadow: 0 0 10px rgba(212, 196, 168, 0.3); }

        button {
            width: 100%; height: 50px;
            background: var(--text-gold); color: #1a1a1a;
            border: none; font-weight: bold; cursor: pointer;
            font-size: 1rem; letter-spacing: 2px; border-radius: 4px;
        }

        /* 结果显示区 */
        #result-box { display: none; margin-top: 10px; }

        .identity-label { font-size: 0.7rem; color: #888; margin-bottom: 5px; }
        .role-title { font-size: 2.4rem; font-weight: 900; margin: 15px 0; letter-spacing: 4px; }
        
        /* 阵营配色切换 */
        .theme-wolf { border-color: var(--wolf-red) !important; box-shadow: 0 0 30px rgba(255, 77, 77, 0.2); }
        .theme-wolf .role-title { color: var(--wolf-red); }

        .theme-human { border-color: var(--human-blue) !important; box-shadow: 0 0 30px rgba(77, 166, 255, 0.2); }
        .theme-human .role-title { color: var(--human-blue); }

        .mission-desc {
            background: rgba(0,0,0,0.4); padding: 15px;
            font-size: 0.85rem; line-height: 1.6; color: #ccc;
            text-align: justify; border-left: 3px solid #666;
        }
    </style>
</head>
<body>

    <div class="main-card" id="card">
        <div class="header-title">TOP SECRET // 绝密档案解密</div>
        
        <div id="login-form">
            <div class="input-area">
                <label>身份识别码 (QQ/手机尾号最后一位)</label>
                <input type="number" id="idCode" placeholder="0 - 9" pattern="[0-9]*" inputmode="numeric">
            </div>
            <button onclick="decode()">确 认 身 份</button>
        </div>

        <div id="result-box">
            <div class="identity-label">DECODING COMPLETE / 解码完成</div>
            <div class="role-title" id="roleTitle">测试中</div>
            <div class="mission-desc" id="roleDesc">正在提取任务简报...</div>
            <p style="font-size: 0.6rem; color: #555; margin-top: 25px;">※ 档案已自动销毁，请开始你的行动。</p>
        </div>
    </div>

    <script>
        function decode() {
            const code = document.getElementById('idCode').value;
            if (code === "") { alert("请输入识别码"); return; }

            const card = document.getElementById('card');
            const form = document.getElementById('login-form');
            const result = document.getElementById('result-box');
            const roleTitle = document.getElementById('roleTitle');
            const roleDesc = document.getElementById('roleDesc');

            // 核心逻辑：尾号为单数 (1,3,5,7,9) 为狼人
            const isWolf = (parseInt(code.slice(-1)) % 2 !== 0);

            form.style.display = 'none';
            result.style.display = 'block';

            if (isWolf) {
                card.classList.add('theme-wolf');
                roleTitle.innerText = "潜 伏 狼";
                roleDesc.innerText = "【黑化任务】：撕开你第一周伪善的面具。在画作中揭示你的真实意图。之前的救人工具应变为杀戮凶器，温柔的眼神应染上血腥。这是你展现‘真实’的时刻。";
            } else {
                card.classList.add('theme-human');
                roleTitle.innerText = "清 白 者";
                roleDesc.innerText = "【搜证任务】：狼人已经就在你身边。你必须在画作中通过光影或构图，表达出警觉、防御或揭露。画出你职业中最坚韧的正义感，并留下指向狼人的证据。";
            }
        }
    </script>
</body>
</html>
